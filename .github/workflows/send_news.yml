name: Daily Market News

on:
  schedule:
    - cron: '30 1 * * 1-5'   # 7:00 AM IST - Asian recap
    - cron: '0 3 * * 1-5'    # 8:30 AM IST - Before India opens
    - cron: '0 13 * * 1-5'   # 6:30 PM IST - Before US opens
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python news_bot.py
