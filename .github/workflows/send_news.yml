name: Daily Market News

on:
  schedule:
    # Runs at 7:30 AM IST = 2:00 AM UTC
    - cron: '0 2 * * 1-5'   # Mon-Fri only
  workflow_dispatch:          # Also allows manual trigger

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python news_bot.py
```

---

### Step 4 — Add Secrets to GitHub

In your repo → **Settings → Secrets and variables → Actions → New repository secret**

Add these 3 secrets:
| Name | Value |
|------|-------|
| `TELEGRAM_TOKEN` | Your BotFather token |
| `CHAT_ID` | Your Telegram chat ID |
| `GROQ_API_KEY` | Your Groq API key |

---

### Step 5 — Test It

Go to **Actions tab** in your repo → click `Daily Market News` → **Run workflow** manually to verify it works before relying on the schedule.

